<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D48A;
    --dark: #1A0E2E;
    --dark2: #2D1F4A;
    --purple: #4A2C8A;
    --cream: #FAF6EE;
    --green: #2D7A4F;
    --green-light: #D4EDDA;
    --red: #8A2D2D;
    --red-light: #EDCECE;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(74,44,138,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.15) 0%, transparent 60%);
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  /* ====== ÉCRAN ACCUEIL ====== */
  #screen-home {
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .cross-symbol {
    font-size: 56px;
    display: block;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 900;
    color: var(--gold);
    line-height: 1.1;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .subtitle {
    font-size: 1rem;
    color: rgba(250,246,238,0.6);
    font-weight: 300;
    margin-bottom: 2.5rem;
    letter-spacing: 0.05em;
  }

  .level-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .level-card {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    padding: 1.2rem 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .level-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 16px;
  }

  .level-card:hover { transform: translateY(-3px); border-color: var(--gold); }
  .level-card.active { border-color: var(--gold); background: rgba(201,168,76,0.12); }
  .level-card.active::before { opacity: 1; }

  .level-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
  .level-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--gold); display: block; margin-bottom: 4px; }
  .level-desc { font-size: 0.72rem; color: rgba(250,246,238,0.5); display: block; }

  .btn-start {
    width: 100%;
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    border: none;
    border-radius: 50px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    box-shadow: 0 8px 30px rgba(201,168,76,0.3);
  }

  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(201,168,76,0.4); }
  .btn-start:active { transform: translateY(0); }

  /* ====== ÉCRAN JEU ====== */
  #screen-game { display: none; animation: fadeIn 0.4s ease; }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .q-info { font-size: 0.85rem; color: rgba(250,246,238,0.5); }
  .score-badge {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    padding: 4px 14px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 700;
  }

  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .timer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .timer-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }

  .timer-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.9s linear, background 0.3s;
    width: 100%;
  }

  .timer-fill.urgent { background: #E24B4A; }
  .timer-num { font-size: 0.85rem; font-weight: 700; color: var(--gold); min-width: 24px; text-align: right; }

  .level-pill {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 12px;
    border-radius: 50px;
    margin-bottom: 1rem;
  }

  .pill-facile { background: rgba(45,122,79,0.2); color: #6FCF97; border: 1px solid rgba(45,122,79,0.4); }
  .pill-intermediaire { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .pill-difficile { background: rgba(138,45,45,0.2); color: #EB5757; border: 1px solid rgba(138,45,45,0.4); }

  .question-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 700;
    color: var(--cream);
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .question-ref {
    font-size: 0.75rem;
    color: rgba(201,168,76,0.6);
    font-style: italic;
  }

  .choices { display: grid; gap: 10px; margin-bottom: 1rem; }

  .choice-btn {
    width: 100%;
    text-align: left;
    padding: 0.9rem 1.1rem;
    border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--cream);
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
    transform: translateX(4px);
  }

  .choice-btn:disabled { cursor: default; transform: none; }

  .choice-btn.correct {
    border-color: var(--green);
    background: rgba(45,122,79,0.2);
    color: #6FCF97;
  }

  .choice-btn.wrong {
    border-color: var(--red);
    background: rgba(138,45,45,0.2);
    color: #EB5757;
  }

  .choice-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .explication {
    background: rgba(45,122,79,0.12);
    border-left: 3px solid var(--green);
    border-radius: 0 12px 12px 0;
    padding: 0.9rem 1rem;
    font-size: 0.85rem;
    color: rgba(250,246,238,0.75);
    line-height: 1.6;
    margin-bottom: 1rem;
    display: none;
  }

  .btn-next {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    border: none;
    border-radius: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: all 0.2s;
  }

  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

  /* ====== RÉSULTATS ====== */
  #screen-results {
    display: none;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }

  .trophy-big { font-size: 72px; display: block; margin-bottom: 1rem; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .result-score {
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--cream);
    margin-bottom: 0.5rem;
    font-family: 'Playfair Display', serif;
  }

  .result-msg {
    font-size: 1rem;
    color: rgba(250,246,238,0.65);
    margin-bottom: 1.5rem;
    line-height: 1.6;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .result-verse {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 16px;
    padding: 1.2rem;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--gold-light);
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  .btn-replay {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    border: none;
    border-radius: 50px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 30px rgba(201,168,76,0.3);
  }

  .btn-replay:hover { transform: translateY(-2px); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .stars-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 1rem; font-size: 1.8rem; }
</style>
</head>
<body>
<div class="container">

  <!-- ACCUEIL -->
  <div id="screen-home">
    <span class="cross-symbol">✝</span>
    <h1>Quiz Biblique</h1>
    <p class="subtitle">Testez vos connaissances de la Parole de Dieu</p>

    <div style="margin-bottom:1.2rem;">
      <label style="display:block;font-size:13px;color:rgba(250,246,238,0.6);margin-bottom:8px;letter-spacing:0.03em;">Votre prénom</label>
      <input type="text" id="player-name" placeholder="Ex: Marie, Jean, Esther..." maxlength="20"
        style="width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid rgba(201,168,76,0.3);background:rgba(255,255,255,0.06);color:var(--cream);font-size:15px;font-family:'Lato',sans-serif;outline:none;"
        onfocus="this.style.borderColor='rgba(201,168,76,0.8)'"
        onblur="this.style.borderColor='rgba(201,168,76,0.3)'"
      />
    </div>

    <div class="level-grid">
      <div class="level-card active" data-level="facile" onclick="selectLevel('facile')">
        <span class="level-icon">🌱</span>
        <span class="level-name">Facile</span>
        <span class="level-desc">Débutant</span>
      </div>
      <div class="level-card" data-level="intermediaire" onclick="selectLevel('intermediaire')">
        <span class="level-icon">📖</span>
        <span class="level-name">Intermédiaire</span>
        <span class="level-desc">Connaisseur</span>
      </div>
      <div class="level-card" data-level="difficile" onclick="selectLevel('difficile')">
        <span class="level-icon">🔥</span>
        <span class="level-name">Difficile</span>
        <span class="level-desc">Théologien</span>
      </div>
    </div>

    <button class="btn-start" onclick="startGame()">Commencer la partie ✦</button>

    <button onclick="showLeaderboard()" style="width:100%;margin-top:10px;padding:11px;border-radius:50px;border:1.5px solid rgba(201,168,76,0.3);background:transparent;color:var(--gold);font-family:'Playfair Display',serif;font-size:1rem;cursor:pointer;">🏆 Voir le classement</button>
  </div>

  <!-- CLASSEMENT -->
  <div id="screen-leaderboard" style="display:none;animation:fadeIn 0.4s ease;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <span style="font-size:40px;display:block;margin-bottom:8px;">🏆</span>
      <h1 style="font-size:1.8rem;">Classement</h1>
      <p class="subtitle">Meilleurs scores de la session</p>
    </div>
    <div id="leaderboard-list" style="margin-bottom:1.5rem;"></div>
    <button onclick="clearLeaderboard()" style="width:100%;padding:11px;border-radius:50px;border:1.5px solid rgba(138,45,45,0.4);background:transparent;color:#EB5757;font-family:'Lato',sans-serif;font-size:0.9rem;cursor:pointer;margin-bottom:10px;">🗑 Réinitialiser le classement</button>
    <button onclick="showHome()" style="width:100%;padding:11px;border-radius:50px;border:1.5px solid rgba(201,168,76,0.3);background:transparent;color:var(--gold);font-family:'Playfair Display',serif;font-size:1rem;cursor:pointer;">← Retour</button>
  </div>

  <!-- JEU -->
  <div id="screen-game">
    <div class="game-header">
      <span class="q-info" id="q-info">Question 1 / 10</span>
      <span class="score-badge" id="score-badge">Score : 0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="timer-row">
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
      <span class="timer-num" id="timer-num">20</span>
    </div>
    <div id="level-pill"></div>
    <div class="question-card">
      <p class="question-text" id="question-text"></p>
      <p class="question-ref" id="question-ref"></p>
    </div>
    <div class="choices" id="choices"></div>
    <div class="explication" id="explication"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Question suivante →</button>
  </div>

  <!-- RÉSULTATS -->
  <div id="screen-results">
    <span class="trophy-big" id="trophy">🏆</span>
    <div class="stars-row" id="stars-row"></div>
    <h2 class="result-title" id="result-title"></h2>
    <div class="result-score" id="result-score"></div>
    <p class="result-msg" id="result-msg"></p>
    <div class="result-verse" id="result-verse"></div>
    <button class="btn-replay" onclick="resetGame()">↺ Rejouer</button>
    <button onclick="showLeaderboard()" style="width:100%;margin-top:10px;padding:12px;border-radius:50px;border:1.5px solid rgba(201,168,76,0.4);background:transparent;color:var(--gold);font-family:'Playfair Display',serif;font-size:1rem;cursor:pointer;">🏆 Voir le classement</button>
  </div>

</div>

<script>
const ALL_QUESTIONS = {
  facile: [
    { q: "Combien de jours Dieu a-t-il mis pour créer le monde ?", ref: "Genèse 1", choix: ["5 jours", "6 jours", "7 jours", "10 jours"], correct: 1, exp: "Dieu créa en 6 jours et se reposa le 7e jour, le sabbat." },
    { q: "Dans quelle ville Jésus est-il né ?", ref: "Luc 2:4-7", choix: ["Nazareth", "Jérusalem", "Jéricho", "Bethléem"], correct: 3, exp: "Jésus est né à Bethléem, la ville de David." },
    { q: "Combien d'apôtres Jésus avait-il ?", ref: "Matthieu 10:1-4", choix: ["10", "11", "14", "12"], correct: 3, exp: "Jésus avait 12 apôtres, représentant les 12 tribus d'Israël." },
    { q: "Qui a baptisé Jésus ?", ref: "Matthieu 3:13-17", choix: ["Pierre", "Paul", "Élie", "Jean-Baptiste"], correct: 3, exp: "Jean-Baptiste a baptisé Jésus dans le Jourdain." },
    { q: "Avec quoi David a-t-il vaincu Goliath ?", ref: "1 Samuel 17", choix: ["Une épée", "Une lance", "Ses poings", "Une fronde et une pierre"], correct: 3, exp: "David utilisa une fronde et une pierre pour abattre le géant Goliath." },
    { q: "Combien de jours Jonas est-il resté dans le ventre du grand poisson ?", ref: "Jonas 1:17", choix: ["1 jour", "2 jours", "7 jours", "3 jours"], correct: 3, exp: "Jonas resta 3 jours et 3 nuits dans le ventre du poisson." },
    { q: "Comment s'appelait la mère de Jésus ?", ref: "Luc 1:26-31", choix: ["Marthe", "Madeleine", "Élisabeth", "Marie"], correct: 3, exp: "Marie est la mère de Jésus, choisie par Dieu pour porter le Sauveur." },
    { q: "Combien de commandements Dieu a-t-il donnés à Moïse ?", ref: "Exode 20", choix: ["5", "8", "12", "10"], correct: 3, exp: "Dieu a donné les 10 commandements à Moïse sur le mont Sinaï." },
    { q: "Quel objet Noé a-t-il construit pour survivre au déluge ?", ref: "Genèse 6", choix: ["Un radeau", "Un bateau", "Une tour", "L'arche"], correct: 3, exp: "Dieu ordonna à Noé de construire une grande arche pour sauver sa famille et les animaux." },
    { q: "Dans quel fleuve Jésus a-t-il été baptisé ?", ref: "Matthieu 3:13", choix: ["Le Nil", "L'Euphrate", "Le Tigre", "Le Jourdain"], correct: 3, exp: "Jésus a été baptisé dans le fleuve Jourdain par Jean-Baptiste." },
    { q: "Qui était le frère de Moïse ?", ref: "Exode 4:14", choix: ["Caleb", "Josué", "Aaron", "Lévî"], correct: 2, exp: "Aaron était le frère de Moïse et servit de porte-parole devant le Pharaon." },
    { q: "Combien de pains Jésus a-t-il utilisés pour nourrir 5000 personnes ?", ref: "Jean 6:9", choix: ["3", "7", "10", "5"], correct: 3, exp: "Jésus multiplia 5 pains et 2 poissons pour nourrir une foule de 5000 hommes." },
    { q: "Quel est le premier livre de la Bible ?", ref: "Bible", choix: ["Exode", "Psaumes", "Matthieu", "Genèse"], correct: 3, exp: "La Genèse est le premier livre de la Bible, il décrit la création du monde." },
    { q: "Quel est le dernier livre de la Bible ?", ref: "Bible", choix: ["Jude", "Hébreux", "Daniel", "Apocalypse"], correct: 3, exp: "L'Apocalypse (ou Révélation) est le dernier livre de la Bible, écrit par l'apôtre Jean." },
    { q: "Qui a vendu Joseph à des marchands égyptiens ?", ref: "Genèse 37:28", choix: ["Son père Jacob", "Ses frères", "Des soldats", "Des pirates"], correct: 1, exp: "Les frères de Joseph, jaloux de lui, le vendirent à des marchands ismaélites pour 20 pièces d'argent." },
    { q: "De quelle couleur était le manteau de Joseph offert par son père ?", ref: "Genèse 37:3", choix: ["Rouge", "Blanc", "Bleu", "De plusieurs couleurs"], correct: 3, exp: "Jacob offrit à son fils Joseph un manteau de plusieurs couleurs, symbole de sa préférence." },
    { q: "Qui est le roi des Juifs qui cherchait à tuer Jésus à sa naissance ?", ref: "Matthieu 2:16", choix: ["César", "Pilate", "Hérode", "Caïphe"], correct: 2, exp: "Le roi Hérode ordonna le massacre des enfants de moins de 2 ans pour tuer le nouveau-né Jésus." },
    { q: "Combien d'années Israël a-t-il erré dans le désert ?", ref: "Nombres 14:34", choix: ["20 ans", "50 ans", "10 ans", "40 ans"], correct: 3, exp: "À cause de leur incrédulité, les Israélites errèrent 40 ans dans le désert avant d'entrer en Canaan." },
    { q: "Quel animal parla à Ève dans le jardin d'Éden ?", ref: "Genèse 3:1", choix: ["Un aigle", "Un lion", "Le serpent", "Un âne"], correct: 2, exp: "Le serpent, plus rusé que tous les animaux, tenta Ève en remettant en question la parole de Dieu." },
    { q: "Comment s'appelait le père de Jésus sur terre ?", ref: "Matthieu 1:16", choix: ["Jean", "Pierre", "Joseph", "Simon"], correct: 2, exp: "Joseph, charpentier de Nazareth, était le père adoptif de Jésus et l'époux de Marie." },
    { q: "Sur quelle montagne Moïse a-t-il reçu les 10 commandements ?", ref: "Exode 19:20", choix: ["Mont Carmel", "Mont Hermon", "Mont des Oliviers", "Mont Sinaï"], correct: 3, exp: "Dieu appela Moïse sur le mont Sinaï et lui remit les tables de la loi." },

function saveScore(name, sc, total, level) {
  var pct = Math.round((sc / total) * 100);
  db.collection('scores').add({
    name: name,
    score: sc,
    total: total,
    level: level,
    pct: pct,
    date: new Date().toLocaleDateString('fr-CA'),
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(e) { console.log('Erreur Firebase:', e); });
}

function showLeaderboard() {
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-results').style.display = 'none';
  document.getElementById('screen-leaderboard').style.display = 'block';
  renderLeaderboard();
}

function renderLeaderboard() {
  var el = document.getElementById('leaderboard-list');
  el.innerHTML = '<p style="text-align:center;color:rgba(250,246,238,0.4);font-size:14px;padding:2rem 0;">Chargement... ⏳</p>';
  db.collection('scores').orderBy('pct', 'desc').orderBy('timestamp', 'desc').limit(20).get()
  .then(function(snap) {
    if (snap.empty) {
      el.innerHTML = '<p style="text-align:center;color:rgba(250,246,238,0.4);font-size:14px;padding:2rem 0;">Aucun score enregistré.<br>Jouez une partie pour apparaître ici !</p>';
      return;
    }
    var medals = ['🥇','🥈','🥉'];
    var levelIcon = { facile: '🌱', intermediaire: '📖', difficile: '🔥' };
    var html = '';
    snap.docs.forEach(function(doc, i) {
      var entry = doc.data();
      html += '<div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,' + (i<3?'0.3':'0.1') + ');border-radius:12px;padding:12px 14px;margin-bottom:8px;">' +
        '<span style="font-size:20px;min-width:28px;text-align:center;">' + (medals[i] || (i+1)+'.') + '</span>' +
        '<div style="flex:1;">' +
          '<p style="font-size:14px;font-weight:500;color:var(--cream);margin:0;">' + entry.name + '</p>' +
          '<p style="font-size:11px;color:rgba(250,246,238,0.45);margin:2px 0 0;">' + (levelIcon[entry.level]||'') + ' ' + entry.level + ' · ' + (entry.date||'') + '</p>' +
        '</div>' +
        '<div style="text-align:right;">' +
          '<p style="font-size:16px;font-weight:700;color:var(--gold);margin:0;">' + entry.score + '/' + entry.total + '</p>' +
          '<p style="font-size:11px;color:rgba(250,246,238,0.45);margin:2px 0 0;">' + entry.pct + '%</p>' +
        '</div>' +
      '</div>';
    });
    el.innerHTML = html;
  })
  .catch(function(e) {
    el.innerHTML = '<p style="text-align:center;color:#EB5757;font-size:13px;padding:1rem;">Erreur de connexion. Vérifie ta connexion internet.</p>';
  });
}

function clearLeaderboard() {
  if (confirm('Réinitialiser tout le classement ?')) {
    db.collection('scores').get().then(function(snap) {
      var batch = db.batch();
      snap.docs.forEach(function(doc) { batch.delete(doc.ref); });
      return batch.commit();
    }).then(function() { renderLeaderboard(); });
  }
}

  currentLevel = lvl;
  document.querySelectorAll('.level-card').forEach(c => c.classList.remove('active'));
  document.querySelector('[data-level="' + lvl + '"]').classList.add('active');
}

function startGame() {
  var nameInput = document.getElementById('player-name');
  playerName = nameInput ? nameInput.value.trim() : '';
  if (!playerName) { playerName = 'Anonyme'; }
  var pool = ALL_QUESTIONS[currentLevel];
  // Si toutes les questions ont été posées, on réinitialise
  if (usedIndexes[currentLevel].length >= pool.length) {
    usedIndexes[currentLevel] = [];
  }
  // Prendre 10 questions non encore posées
  var available = pool.map(function(_, i) { return i; })
    .filter(function(i) { return usedIndexes[currentLevel].indexOf(i) === -1; });
  var picked = shuffle(available).slice(0, 10);
  // Marquer ces questions comme utilisées
  picked.forEach(function(i) { usedIndexes[currentLevel].push(i); });
  questions = picked.map(function(i) { return pool[i]; });
  currentQ = 0; score = 0; answered = false;
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-game').style.display = 'block';
  document.getElementById('screen-results').style.display = 'none';
  showQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('q-info').textContent = 'Question ' + (currentQ + 1) + ' / ' + total;
  document.getElementById('score-badge').textContent = 'Score : ' + score;
  document.getElementById('progress-fill').style.width = Math.round((currentQ / total) * 100) + '%';

  const pillEl = document.getElementById('level-pill');
  const pillClass = { facile: 'pill-facile', intermediaire: 'pill-intermediaire', difficile: 'pill-difficile' }[currentLevel];
  const pillLabel = { facile: '🌱 Facile', intermediaire: '📖 Intermédiaire', difficile: '🔥 Difficile' }[currentLevel];
  pillEl.innerHTML = '<span class="level-pill ' + pillClass + '">' + pillLabel + '</span>';

  document.getElementById('question-text').textContent = q.q;
  document.getElementById('question-ref').textContent = q.ref || '';
  document.getElementById('explication').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';

  const letters = ['A', 'B', 'C', 'D'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choix.forEach(function(c, i) {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.setAttribute('data-index', i);
    btn.innerHTML = '<span class="choice-letter">' + letters[i] + '</span>' + c;
    btn.onclick = function() { answer(i); };
    choicesEl.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 20;
  updateTimer();
  timer = setInterval(function() {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timer);
      if (!answered) { timeUp(); }
    }
  }, 1000);
}

function updateTimer() {
  document.getElementById('timer-num').textContent = timeLeft;
  const pct = Math.round((timeLeft / 20) * 100);
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  if (timeLeft <= 5) fill.classList.add('urgent');
  else fill.classList.remove('urgent');
}

function timeUp() {
  answered = true;
  const q = questions[currentQ];
  document.querySelectorAll('.choice-btn').forEach(function(btn) {
    btn.disabled = true;
    if (parseInt(btn.getAttribute('data-index')) === q.correct) btn.classList.add('correct');
  });
  document.getElementById('explication').textContent = '⏱ Temps écoulé ! ' + q.exp;
  document.getElementById('explication').style.display = 'block';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = currentQ + 1 < questions.length ? 'Question suivante →' : 'Voir mes résultats →';
  nextBtn.style.display = 'block';
}

function answer(chosen) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  const q = questions[currentQ];

  document.querySelectorAll('.choice-btn').forEach(function(btn) {
    btn.disabled = true;
    const idx = parseInt(btn.getAttribute('data-index'));
    if (idx === q.correct) btn.classList.add('correct');
    else if (idx === chosen) btn.classList.add('wrong');
  });

  if (chosen === q.correct) score++;
  document.getElementById('score-badge').textContent = 'Score : ' + score;

  document.getElementById('explication').textContent = q.exp;
  document.getElementById('explication').style.display = 'block';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = currentQ + 1 < questions.length ? 'Question suivante →' : 'Voir mes résultats →';
  nextBtn.style.display = 'block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) { showResults(); return; }
  showQuestion();
}

function showResults() {
  clearInterval(timer);
  saveScore(playerName, score, questions.length, currentLevel);
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('screen-results').style.display = 'block';
  const total = questions.length;
  const pct = score / total;
  let trophy, title, msg, verse, stars;
  if (pct === 1) { trophy='🏆'; title='Parfait !'; msg='Tu connais la Bible comme ta poche. Tu es vraiment béni(e) !'; verse='"Ta parole est une lampe à mes pieds, et une lumière sur mon sentier." — Psaume 119:105'; stars='⭐⭐⭐⭐⭐'; }
  else if (pct >= 0.8) { trophy='🌟'; title='Excellent !'; msg='Tu as une belle connaissance des Écritures. Continue ainsi !'; verse='"Heureux ceux qui écoutent la parole de Dieu et qui la gardent !" — Luc 11:28'; stars='⭐⭐⭐⭐'; }
  else if (pct >= 0.6) { trophy='📖'; title='Bien joué !'; msg='Tu maîtrises bien la Bible. Quelques révisions et tu atteins le sommet !'; verse='"Étudiez les Écritures, car vous pensez avoir en elles la vie éternelle." — Jean 5:39'; stars='⭐⭐⭐'; }
  else if (pct >= 0.4) { trophy='✝️'; title='Bon début !'; msg='La Bible est un trésor à explorer. Chaque lecture te rapproche de Dieu.'; verse='"La foi vient de ce qu\'on entend, et ce qu\'on entend vient de la parole de Christ." — Romains 10:17'; stars='⭐⭐'; }
  else { trophy='🙏'; title='Continue !'; msg='Ne te décourage pas ! C\'est en lisant et relisant la Parole que la sagesse vient.'; verse='"Recherchez d\'abord le royaume de Dieu et sa justice." — Matthieu 6:33'; stars='⭐'; }

  document.getElementById('trophy').textContent = trophy;
  document.getElementById('stars-row').textContent = stars;
  document.getElementById('result-title').textContent = playerName + ' — ' + title;
  document.getElementById('result-score').textContent = score + ' / ' + total;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-verse').textContent = verse;
}

function resetGame() {
  document.getElementById('screen-results').style.display = 'none';
  document.getElementById('screen-home').style.display = 'block';
}
</script>
